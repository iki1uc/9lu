<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>9lu – Time Tunnel</title>

  <style>
    body { background:#000; margin:0; }
    canvas { display:block; margin:auto; background:#111; }
  </style>

  <script type="module">
    import { animate9lu } from "./9luAnim.js";
    import { draw9lu3D } from "./9lu3D.js";
    import { drawRing6 } from "./ring6.js";

    window.onload = () => {
        const c = document.getElementById("canvas9lu");
        const x = c.getContext("2d");

        // ⭐ Reihenfolge für Time‑Tunnel
        drawRing6(x);     // Meta‑Ebene sichtbar
        animate9lu(x);    // Animation sichtbar
        draw9lu3D(x);     // 3D‑Tiefe sichtbar
    };
  </script>
</head>

<body>
  <canvas id="canvas9lu" width="600" height="600"></canvas>
</body>
</html>
